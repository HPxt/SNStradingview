services:
  - type: web
    name: rsi-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --threads 2 --timeout 120
    envVars:
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: GMAIL_PASS
        sync: false
